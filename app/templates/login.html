{% extends 'layout/base.html' %}

{% block title %}Đăng nhập - Quản lý Phòng trọ Năm Lộc{% endblock %}

{% block header %}{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="height: 80vh;">
    <div class="card shadow-sm" style="width: 100%; max-width: 400px;">
        <div class="card-body p-4">
            <h4 class="text-center fw-bold mb-4 text-uppercase">Phòng Trọ Năm Lộc</h4>

            <form method="POST" action="{{ url_for('views.login_view') }}">
                <div class="mb-3">
                    <label class="form-label fw-bold">Tài khoản</label>
                    <input type="text" name="username" class="form-control border-dark" placeholder="Nhập tài khoản..." required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Mật khẩu</label>
                    <input type="password" name="password" class="form-control border-dark" placeholder="Nhập mật khẩu..." required>
                </div>
                <button type="submit" class="btn btn-dark w-100 fw-bold">ĐĂNG NHẬP</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
