{% extends 'layout/base.html' %}

{% block title %}Đăng nhập - Quản lý Phòng trọ Năm Lộc{% endblock %}

{% block header %}{% endblock %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: 75vh;">
    <div class="jb-card" style="width: 100%; max-width: 420px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 style="font-weight: 700; letter-spacing: -0.5px; background: var(--gradient-glow); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem;">PHÒNG TRỌ NĂM LỘC</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Hệ thống quản lý phòng trọ</p>
        </div>

        <form method="POST" action="{{ url_for('views.login_view') }}">
            <div class="field-wrapper" style="margin-bottom: 1.25rem;">
                <label class="field-label">Tài khoản</label>
                <input type="text" name="username" class="input-control" required autofocus placeholder="username">
            </div>

            <div class="field-wrapper" style="margin-bottom: 2rem;">
                <label class="field-label">Mật khẩu</label>
                <input type="password" name="password" class="input-control" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-core btn-gradient-action" style="width: 100%; padding: 0.75rem;">ĐĂNG NHẬP</button>
        </form>
    </div>
</div>
{% endblock %}
