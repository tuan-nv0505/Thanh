{% extends 'layout/base.html' %}

{% block title %}Thành viên - {{ group.group_name }}{% endblock %}

{% block content %}
<a href="{{ url_for('views.room_detail', room_id=group.room_id) }}" class="btn btn-sm btn-outline-dark mb-4">&larr; Quay lại Phòng {{ group.room.room_name }}</a>

<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span class="text-uppercase">Thành viên: {{ group.group_name }}</span>
        <button class="btn btn-dark btn-sm" data-bs-toggle="modal" data-bs-target="#addCustomerModal">
            + Thêm Thành Viên
        </button>
    </div>
    
    </div>
{% endblock %}
